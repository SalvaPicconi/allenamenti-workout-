    // ===== AUDIO BEEPS =====
    const useBeeper = () => {
      const ctxRef = useRef(null);
      const lastSpokenRef = useRef(null);

      const ensureCtx = () => {
        if (!ctxRef.current) {
          try { ctxRef.current = new (window.AudioContext || window.webkitAudioContext)(); }
          catch(e) { return null; }
        }
        if (ctxRef.current && ctxRef.current.state === 'suspended') ctxRef.current.resume();
        return ctxRef.current;
      };

      const tone = (freq, dur, vol = 0.25, type = 'sine') => {
        const ctx = ensureCtx(); if (!ctx) return;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq;
        o.type = type;
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        o.start(); o.stop(ctx.currentTime + dur);
      };

      const sequence = (notes) => {
        const ctx = ensureCtx(); if (!ctx) return;
        notes.forEach((n, i) => {
          setTimeout(() => tone(n.freq, n.dur, n.vol || 0.25, n.type || 'sine'), n.delay || i * 150);
        });
      };

      const speak = (text, opts = {}) => {
        if (!('speechSynthesis' in window)) return;
        if (lastSpokenRef.current && lastSpokenRef.current.text === text && Date.now() - lastSpokenRef.current.t < 500) return;
        lastSpokenRef.current = { text, t: Date.now() };
        try {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'it-IT';
          u.rate = opts.rate || 1.05;
          u.pitch = opts.pitch || 1.0;
          u.volume = opts.volume || 1.0;
          window.speechSynthesis.speak(u);
        } catch(e) {}
      };

      return {
        initAudio: ensureCtx,

        // === SUONI BASE (retrocompatibili) ===
        countdown: () => tone(700, 0.08, 0.22, 'square'),
        startWork: () => sequence([
          { freq: 880, dur: 0.12, vol: 0.32 },
          { freq: 1175, dur: 0.18, vol: 0.34, delay: 130 }
        ]),
        startRest: () => sequence([
          { freq: 587, dur: 0.18, vol: 0.28 },
          { freq: 440, dur: 0.22, vol: 0.26, delay: 180 }
        ]),
        finish: () => sequence([
          { freq: 523, dur: 0.15, vol: 0.3 },
          { freq: 659, dur: 0.15, vol: 0.32, delay: 180 },
          { freq: 784, dur: 0.15, vol: 0.34, delay: 360 },
          { freq: 1047, dur: 0.5, vol: 0.36, delay: 540 }
        ]),

        // === SUONI EVENTO SPECIFICI ===
        sessionStart: () => {
          sequence([
            { freq: 523, dur: 0.12 },

      stretch:    { bg: 'bg-purple-600',  text: 'text-purple-100',  label: 'STRETCH' },
      cooldown:   { bg: 'bg-indigo-600',  text: 'text-indigo-100',  label: 'DEFATICAMENTO' },
      mobility:   { bg: 'bg-fuchsia-600', text: 'text-fuchsia-100', label: 'MOBILITÀ' }
    };

    // ===== MAIN COMPONENT =====
    function OutdoorTraining() {
      const [view, setView] = useState('home');
      const [workoutId, setWorkoutId] = useState(null);
      const [phaseIdx, setPhaseIdx] = useState(0);
      const [secondsLeft, setSecondsLeft] = useState(0);
      const [running, setRunning] = useState(false);
      const [soundOn, setSoundOn] = useState(true);
      const [totalElapsed, setTotalElapsed] = useState(0);
      const beeper = useBeeper();

      const workout = workouts.find(w => w.id === workoutId);
      const phase = workout?.phases[phaseIdx];
      const totalDuration = workout ? workout.phases.reduce((acc, p) => acc + p.duration, 0) : 0;
      const colors = phase ? (phaseColors[phase.type] || phaseColors.work) : phaseColors.work;

      // Timer
      useEffect(() => {
        if (!running || view !== 'workout') return;
        const half = Math.floor(totalDuration / 2);
        const t = setInterval(() => {
          setSecondsLeft(s => {
            if (s <= 1) return 0;
            if (soundOn) {
              if (s === 11) beeper.warning10s();
              if (s === 4) beeper.warning3s(3);
              if (s === 3) beeper.warning3s(2);
              if (s === 2) beeper.warning3s(1);
            }
            return s - 1;
          });
          setTotalElapsed(prev => {
            if (soundOn && half > 60 && prev + 1 === half) beeper.halfway();
            return prev + 1;
          });
        }, 1000);
        return () => clearInterval(t);
      }, [running, view, soundOn]);

      // Phase transition
      useEffect(() => {
        if (!running || secondsLeft !== 0) return;
        if (phaseIdx >= (workout?.phases.length || 0) - 1) {
          setRunning(false);
          if (soundOn) {
            beeper.finish();
            setTimeout(() => beeper.speak('Allenamento completato. Brava!'), 1500);
          }
          setView('complete');
          return;
        }
        const next = workout.phases[phaseIdx + 1];
        if (soundOn) {
          if (next.type === 'work') beeper.startWork();
          else if (next.type === 'bike') {
            beeper.startWork();
            setTimeout(() => beeper.speak('Inizia il tratto in bici'), 400);
          }
          else if (next.type === 'rest' || next.type === 'rest_long') beeper.startRest();
          else if (next.type === 'transition') beeper.transitionTone();
          else if (next.type === 'stretch') {
            beeper.transitionTone();
            setTimeout(() => beeper.speak('Stretching'), 300);
          }
          else beeper.transitionTone();

          if (['work', 'bike', 'stretch', 'mobility', 'cooldown'].includes(next.type)) {
            setTimeout(() => beeper.announceExercise(next.name, next.duration), 800);
          }
          if (/ultim|finale/i.test(next.name)) {
            setTimeout(() => beeper.lastRound(), 1500);
          }
        }
        setPhaseIdx(i => i + 1);
        setSecondsLeft(next.duration);
      }, [secondsLeft, running]);

      const startWorkout = (id) => {
        const w = workouts.find(w => w.id === id);
        setWorkoutId(id);
        setPhaseIdx(0);
        setSecondsLeft(w.phases[0].duration);
        setTotalElapsed(0);
        setRunning(false);
        setView('workout');
        beeper.initAudio();
        if (soundOn) {
          setTimeout(() => beeper.speak(`Allenamento ${w.title}. Pronta a iniziare`), 200);
        }
      };

      // Auto-start da link hub (es. outdoor-fitness.html#giorno2)
      useEffect(() => {
        const map = { '#giorno1': 1, '#giorno2': 2, '#giorno3': 3 };
        const id = map[window.location.hash];
        if (id) startWorkout(id);
      }, []);

      const togglePlay = () => {
        if (!running) {
          beeper.initAudio();
          if (soundOn) beeper.sessionStart();
        }
        setRunning(r => !r);
      };

      const skipPhase = () => {
        if (!workout) return;
        if (phaseIdx >= workout.phases.length - 1) {
          setRunning(false); setView('complete'); return;
        }
        const next = workout.phases[phaseIdx + 1];
        setPhaseIdx(i => i + 1);
        setSecondsLeft(next.duration);
      };

      const goHome = () => {
        setRunning(false); setView('home'); setWorkoutId(null);
        history.replaceState(null, '', window.location.pathname);
      };

      const goHub = () => { window.location.href = 'allenamenti.html'; };

      // ===== HOME VIEW =====
      if (view === 'home') {
        return (
          <div className="min-h-screen bg-slate-950 text-white p-4">
            <div className="max-w-md mx-auto">
              <div className="pt-4 pb-1">
                <button onClick={goHub} className="flex items-center gap-1 text-slate-500 hover:text-slate-300 text-sm transition-colors">
                  <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                  Hub allenamenti
                </button>
              </div>
              <header className="text-center py-6">
                <div className="inline-flex items-center gap-2 bg-emerald-900/40 text-emerald-300 px-3 py-1 rounded-full text-xs font-medium mb-3">
                  <Heart className="w-3 h-3" /> Programma Outdoor · 48 anni-friendly
                </div>
                <h1 className="text-3xl font-bold mb-2">Allenamento Outdoor — Ofelia</h1>
                <p className="text-slate-400 text-sm">3 sedute a settimana · Hip-Safe · 60 min</p>
              </header>

              <div className="bg-amber-900/20 border border-amber-700/40 rounded-xl p-3 mb-6 flex gap-2 text-sm">
                <AlertCircle className="w-5 h-5 text-amber-400 flex-shrink-0 mt-0.5" />
                <p className="text-amber-100/90">
                  Versione Hip-Safe per Ofelia: nessun squat, affondo o step-up. Tutti gli esercizi tutelano le anche. Validato BurningPointBasic e Smart Home Workout.
                </p>
              </div>

              <div className="space-y-3">
                {workouts.map(w => (
                  <button key={w.id} onClick={() => startWorkout(w.id)}
                    className="w-full bg-slate-900 hover:bg-slate-800 active:scale-95 transition-all rounded-2xl p-5 text-left border border-slate-800">
                    <div className="flex items-center gap-4">
                      <div className="text-4xl">{w.icon}</div>
                      <div className="flex-1">
                        <div className="text-xs uppercase tracking-wider text-slate-500 font-medium">Giorno {w.id}</div>
                        <div className="text-lg font-bold text-white mb-0.5">{w.title}</div>
                        <div className="text-sm text-slate-400">{w.subtitle}</div>
                        <div className="text-xs text-slate-500 mt-2">⏱ 60 min · {w.phases.length} fasi</div>
                      </div>
                      <ChevronRight className="w-6 h-6 text-slate-600" />
                    </div>
                  </button>
                ))}
              </div>

              <div className="mt-8 bg-slate-900/60 rounded-xl p-4 text-sm text-slate-400">
                <h3 className="font-semibold text-slate-300 mb-2">Come usare</h3>
                <ul className="space-y-1 text-xs">
                  <li>• Tieni lo schermo acceso durante l'allenamento</li>
                  <li>• Audio attivo: alert per inizio/fine fasi</li>
                  <li>• Pausa in qualsiasi momento col tasto ⏸</li>
                  <li>• Idratati prima, durante e dopo</li>
                </ul>
              </div>
            </div>
          </div>
        );
      }

      // ===== WORKOUT VIEW =====
      if (view === 'workout' && phase) {
        const progress = ((phase.duration - secondsLeft) / phase.duration) * 100;
        const totalProgress = (totalElapsed / totalDuration) * 100;

        return (
          <div className={`min-h-screen ${colors.bg} text-white transition-colors duration-500 flex flex-col`}>
            {/* Top bar */}
            <div className="px-4 pt-4 pb-2 flex items-center justify-between">
              <button onClick={goHome} className="p-2 hover:bg-black/20 rounded-lg">
                <ArrowLeft className="w-5 h-5" />
              </button>
              <div className="text-center">
                <div className="text-xs opacity-80 uppercase tracking-wider">{workout.title}</div>
                <div className="text-sm font-mono font-bold">{fmtTime(totalElapsed)} / {fmtTime(totalDuration)}</div>
              </div>
              <button onClick={() => setSoundOn(s => !s)} className="p-2 hover:bg-black/20 rounded-lg">
                {soundOn ? <Volume2 className="w-5 h-5" /> : <VolumeX className="w-5 h-5" />}
              </button>
            </div>

            {/* Total progress bar */}
            <div className="px-4 mb-2">
              <div className="h-1 bg-black/20 rounded-full overflow-hidden">
                <div className="h-full bg-white/60 transition-all duration-1000" style={{ width: `${totalProgress}%` }} />
              </div>
            </div>

            {/* Phase label */}
            <div className="px-4 text-center mt-2">
              <div className="inline-block bg-black/30 px-3 py-1 rounded-full text-xs font-bold tracking-wider">
                {colors.label} · Fase {phaseIdx + 1}/{workout.phases.length}
              </div>
            </div>

            {/* Figure */}
            <div className="flex-1 flex items-center justify-center px-6 py-4">
              <div className="w-48 h-48 text-white/95">
                <Fig type={phase.figure} className="w-full h-full" />
              </div>
            </div>

            {/* Exercise name */}
            <div className="px-4 text-center mb-3">
              <h2 className="text-2xl font-bold mb-2 leading-tight">{phase.name}</h2>
              <p className="text-sm text-white/85 leading-snug max-w-md mx-auto">{phase.instruction}</p>
              {phase.tip && (
                <div className="mt-3 mx-auto max-w-md bg-black/30 rounded-lg px-3 py-2 text-xs">
                  {phase.tip}
                </div>
              )}
            </div>

            {/* Big Timer */}
            <div className="px-4 mb-3">
              <div className="text-center">
                <div className={`text-7xl font-mono font-bold tabular-nums ${secondsLeft <= 3 && secondsLeft > 0 && running ? 'animate-pulse' : ''}`}>
                  {fmtTime(secondsLeft)}
                </div>
              </div>
              <div className="mt-2 max-w-md mx-auto">
                <div className="h-2 bg-black/30 rounded-full overflow-hidden">
                  <div className="h-full bg-white transition-all duration-1000" style={{ width: `${progress}%` }} />
                </div>
              </div>
            </div>

            {/* Next phase preview */}
            {phaseIdx + 1 < workout.phases.length && (
              <div className="px-4 mb-3 text-center">
                <div className="inline-block bg-black/25 px-3 py-1.5 rounded-lg text-xs">
                  <span className="opacity-70">Prossima:</span>{' '}
                  <span className="font-semibold">{workout.phases[phaseIdx + 1].name}</span>
                  <span className="opacity-70"> · {fmtTime(workout.phases[phaseIdx + 1].duration)}</span>
                </div>
              </div>
            )}

            {/* Controls */}
            <div className="p-4 pb-8 flex items-center justify-center gap-4">
              <button onClick={togglePlay}
                className="bg-white text-slate-900 w-20 h-20 rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-transform">
                {running
                  ? <Pause className="w-10 h-10" fill="currentColor" />
                  : <Play className="w-10 h-10 ml-1" fill="currentColor" />}
              </button>
              <button onClick={skipPhase}
                className="bg-black/30 hover:bg-black/40 w-14 h-14 rounded-full flex items-center justify-center active:scale-95 transition-transform">
                <SkipForward className="w-6 h-6" />
              </button>
            </div>
          </div>
        );
      }

      // ===== COMPLETE VIEW =====
      if (view === 'complete') {
        return (
          <div className="min-h-screen bg-gradient-to-b from-emerald-700 to-emerald-900 text-white flex items-center justify-center p-6">
            <div className="text-center max-w-md">
              <div className="bg-white/20 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                <Trophy className="w-12 h-12 text-yellow-300" />
              </div>
              <h2 className="text-4xl font-bold mb-3">Bravo!</h2>
              <p className="text-xl mb-2 opacity-90">{workout?.title} completato</p>
              <p className="text-lg opacity-75 mb-8">⏱ {fmtTime(totalElapsed)} di allenamento</p>
              <div className="bg-black/20 rounded-2xl p-4 mb-6 text-sm space-y-2">
                <p>💧 Idratati subito con acqua e sali minerali</p>
                <p>🥗 Pasto leggero entro 60 minuti</p>
                <p>😴 Dormi bene per ottimizzare il recupero</p>
              </div>
              <button onClick={goHome}
                className="bg-white text-emerald-800 font-bold px-8 py-4 rounded-2xl active:scale-95 transition-transform w-full mb-3">
                Scegli un altro giorno
              </button>
              <button onClick={goHub}
                className="bg-white/10 hover:bg-white/20 text-white font-semibold px-8 py-3 rounded-2xl active:scale-95 transition-transform w-full text-sm">
                ← Torna all'hub
              </button>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OutdoorTraining />);
  </script>
</body>
</html>
